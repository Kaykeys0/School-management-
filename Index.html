<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAnalyze | Student Performance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">

    <div id="login-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">EduAnalyze Login</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-gray-700">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Login</button>
            </form>
            <p class="text-sm text-center text-gray-500 mt-4">Hint: admin / admin123</p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-blue-600">EduAnalyze Dashboard</h2>
            <button id="logout-btn" class="bg-red-500 text-white px-4 py-1 rounded hover:bg-red-600">Logout</button>
        </nav>

        <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-semibold mb-4 border-b pb-2 text-gray-800">Enter Student Marks</h3>
                <form id="student-form" class="space-y-3">
                    <input type="text" id="student-name" placeholder="Student Name" class="w-full border p-2 rounded" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="math" placeholder="Math" class="border p-2 rounded" min="0" max="100" required>
                        <input type="number" id="science" placeholder="Science" class="border p-2 rounded" min="0" max="100" required>
                        <input type="number" id="english" placeholder="English" class="border p-2 rounded" min="0" max="100" required>
                        <input type="number" id="history" placeholder="History" class="border p-2 rounded" min="0" max="100" required>
                        <input type="number" id="geography" placeholder="Geography" class="border p-2 rounded" min="0" max="100" required>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Add Student</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
                        <p class="text-sm text-blue-600 font-bold uppercase">Class Average</p>
                        <p id="class-avg-display" class="text-2xl font-bold">0%</p>
                    </div>
                    <div class="bg-green-50 p-4 rounded-lg border-l-4 border-green-500">
                        <p class="text-sm text-green-600 font-bold uppercase">Top Performer</p>
                        <p id="top-performer-display" class="text-lg font-bold">N/A</p>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-lg border-l-4 border-purple-500">
                        <p class="text-sm text-purple-600 font-bold uppercase">Total Students</p>
                        <p id="student-count-display" class="text-2xl font-bold">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <canvas id="performanceChart" height="100"></canvas>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="flex justify-between items-center p-4 border-b">
                        <h3 class="font-semibold text-gray-800">Detailed Report</h3>
                        <button onclick="window.print()" class="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">Print/PDF</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-4">Rank</th>
                                    <th class="p-4">Name</th>
                                    <th class="p-4">Total</th>
                                    <th class="p-4">Average</th>
                                    <th class="p-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="report-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
